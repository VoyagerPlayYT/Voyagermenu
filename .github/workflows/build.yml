name: Build Theos Tweak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y git curl make xz-utils ca-certificates fakeroot

      - name: Install Theos
        run: |
          sudo git clone --recursive https://github.com/theos/theos.git /opt/theos
          sudo chown -R "$USER" /opt/theos

      - name: Download iOS SDK
        run: |
          sudo mkdir -p /opt/theos/sdks
          curl -L --retry 5 \
            "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz" \
            -o sdk.tar.xz
          sudo tar -xJf sdk.tar.xz -C /opt/theos/sdks
          sudo chown -R "$USER" /opt/theos/sdks
          echo "SDKs installed:"
          ls /opt/theos/sdks/

      - name: Build .deb
        run: make package FINALPACKAGE=1
        env:
          THEOS: /opt/theos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameOverlayMenu-deb
          path: packages/*.deb
          retention-days: 30

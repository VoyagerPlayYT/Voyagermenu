name: Build Theos Tweak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y git curl make xz-utils ca-certificates fakeroot zip

      - name: Install Theos
        run: |
          sudo git clone --recursive https://github.com/theos/theos.git /opt/theos
          sudo chown -R "$USER" /opt/theos

      - name: Download iOS SDK
        run: |
          sudo mkdir -p /opt/theos/sdks
          curl -L --retry 5 \
            "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz" \
            -o sdk.tar.xz
          sudo tar -xJf sdk.tar.xz -C /opt/theos/sdks
          sudo chown -R "$USER" /opt/theos/sdks
          echo "SDKs:" && ls /opt/theos/sdks/

      - name: Download Toolchain
        run: |
          curl -L --retry 5 \
            "https://github.com/sbingner/llvm-project/releases/download/v10.0.0-1/linux-ios-arm64e-clang-toolchain.tar.lzma" \
            -o toolchain.tar.lzma
          TMP=$(mktemp -d)
          tar --lzma -xf toolchain.tar.lzma -C "$TMP"
          sudo mkdir -p /opt/theos/toolchain/linux/iphone
          sudo mv "$TMP/ios-arm64e-clang-toolchain/"* /opt/theos/toolchain/linux/iphone/
          sudo chown -R "$USER" /opt/theos/toolchain
          rm -rf "$TMP" toolchain.tar.lzma
          echo "Toolchain:" && ls /opt/theos/toolchain/linux/iphone/bin/ | head -10

      - name: Build .deb
        run: make package FINALPACKAGE=1
        env:
          THEOS: /opt/theos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameOverlayMenu-deb
          path: packages/*.deb
          retention-days: 30

name: Build Theos Tweak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          brew install ldid xz
          git clone --recursive https://github.com/theos/theos.git $GITHUB_WORKSPACE/theos

      - name: Download iOS SDK
        run: |
          mkdir -p $GITHUB_WORKSPACE/theos/sdks
          curl -L --retry 5 \
            "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz" \
            -o sdk.tar.xz
          tar -xJf sdk.tar.xz -C $GITHUB_WORKSPACE/theos/sdks
          ls $GITHUB_WORKSPACE/theos/sdks/

      - name: Build .deb
        run: make package FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameOverlayMenu-deb
          path: packages/*.deb
          retention-days: 30

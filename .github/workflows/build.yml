name: Build Theos Tweak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          path: theos
          submodules: recursive

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y git curl make xz-utils ca-certificates fakeroot zip

      - name: Download iOS SDK
        run: |
          mkdir -p theos/sdks
          curl -L --retry 5 \
            "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz" \
            -o sdk.tar.xz
          tar -xJf sdk.tar.xz -C theos/sdks
          ls theos/sdks/

      - name: Install clang toolchain via apt
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-15 main"
          sudo apt-get update -q
          sudo apt-get install -y clang-15 lld-15
          sudo mkdir -p theos/toolchain/linux/iphone/bin
          sudo ln -sf $(which clang-15)  theos/toolchain/linux/iphone/bin/clang
          sudo ln -sf $(which clang-15)  theos/toolchain/linux/iphone/bin/clang++
          sudo ln -sf $(which lld-15)    theos/toolchain/linux/iphone/bin/ld
          clang-15 --version

      - name: Build .deb
        run: make package FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameOverlayMenu-deb
          path: packages/*.deb
          retention-days: 30
